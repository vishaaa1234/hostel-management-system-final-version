<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile - Student Hostel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>

{% extends 'base_student.html' %}
{% block content %}

<div class="container py-8">

    <!-- Page Header - Consistent with maintenance request -->
    <div class="page-header mb-4">
        <h4>
            Manage Profile</h4>
        <p>Update your personal information.</p>
                <!-- Line below header -->
        <div class="header-divider"></div>
    </div>
    <div class="register-card">
        <h2>Edit Profile</h2>

        {% if message %}
        <p class="{{ 'success-msg' if success else 'error-msg' }}">{{ message }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('student_edit_profile') }}">

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Full Name"
                       value="{{ student['name'] or '' }}">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Email"
                       value="{{ student['email'] or '' }}">
            </div>

            <div class="form-group">
                <label for="phone_number">Phone Number:</label>
                <input type="tel" id="phone_number" name="phone_number" placeholder="Phone number"
                       value="{{ student['phone_number'] or '' }}">
            </div>

            <div class="form-group">
                <label for="programme">Programme:</label>
                <input type="text" id="programme" name="programme" placeholder="Programme"
                       value="{{ student['programme'] or '' }}">
            </div>

            <div class="form-group">
                <label for="date_of_birth">Date of birth:</label>
                <input type="text" id="date_of_birth" name="date_of_birth" placeholder="Date of birth"
                       value="{{ student['date_of_birth'] or '' }}">
            </div>

            <div class="form-group">
                <label for="year_of_study">Year of study:</label>
                <select id="year_of_study" name="year_of_study" class="form-control">
                    <option value="">Select year of study</option>
                    <option value="1" {% if student['year_of_study']|string == '1' %}selected{% endif %}>Year 1</option>
                    <option value="2" {% if student['year_of_study']|string == '2' %}selected{% endif %}>Year 2</option>
                    <option value="3" {% if student['year_of_study']|string == '3' %}selected{% endif %}>Year 3</option>
                    <option value="4" {% if student['year_of_study']|string == '4' %}selected{% endif %}>Year 4</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">Home address:</label>
                <textarea id="address" name="address" placeholder="Full address"
                          rows="3">{{ student['address'] or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="emergency_contact">Emergency Contact:</label>
                <input type="text" id="emergency_contact" name="emergency_contact" placeholder="Emergency contact"
                       value="{{ student['emergency_contact'] or '' }}">
            </div>

            <hr class="section-divider">
            <p class="section-label">Change password or Leave password fields blank to keep your current password.</p>

            <div class="form-group">
                <label for="current_password">Current Password:</label>
                <input type="password" id="current_password" name="current_password"
                       placeholder="Enter current password">
            </div>

            <div class="form-group">
                <label for="new_password">New Password:</label>
                <input type="password" id="new_password" name="new_password"
                       placeholder="Leave blank to keep current">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       placeholder="Confirm new password">
            </div>

            <div class="form-submit">
                <button type="submit" class="register-btn">
                    Save Changes
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}

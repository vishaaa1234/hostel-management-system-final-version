<!DOCTYPE html>
<html>
<head>
    <title>{{ 'Edit Room' if room else 'Add Room' }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_rooms.css') }}">
</head>

<body>
{% extends 'base_admin.html' %}
{% block content %}

<div class="container py-4">

    <div class="page-header mb-4">
        <h4>{{ 'Edit Room' if room else 'Add New Room' }}</h4>
        <p>{{ 'Update the details for Room ' + room.room_number if room else 'Fill in the details to add a new room.' }}</p>
    </div>

    <div class="form-card">

        <form method="POST"
              action="{{ url_for('edit_room', room_id=room.room_id) if room else url_for('add_room') }}">

            <div class="row g-3">

                <!-- Room Number -->
                <div class="col-md-4">
                    <label class="form-label-sm">Room Number</label>
                    <input type="text" name="room_number" class="form-control form-control-sm"
                           placeholder="e.g. A-101"
                           value="{{ room.room_number if room else '' }}" required>
                </div>

                <!-- Room Type -->
                <div class="col-md-4">
                    <label class="form-label-sm">Room Type</label>
                    <select name="room_type" class="form-select form-select-sm" required>
                        <option value="">Select type</option>
                        {% for t in ['Single','Double','Triple','Quad'] %}
                        <option value="{{ t }}"
                            {% if room and room.room_type == t %}selected{% endif %}>
                            {{ t }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Gender -->
                <div class="col-md-4">
                    <label class="form-label-sm">Gender</label>
                    <select name="gender" class="form-select form-select-sm" required>
                        <option value="">Select gender</option>
                        {% for g in ['Male','Female'] %}
                        <option value="{{ g }}"
                            {% if room and room.gender == g %}selected{% endif %}>
                            {{ g }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Bed Capacity -->
                <div class="col-md-4">
                    <label class="form-label-sm">Bed Capacity</label>
                    <input type="number" name="bed_capacity" class="form-control form-control-sm"
                           min="1" placeholder="e.g. 2"
                           value="{{ room.bed_capacity if room else '' }}" required>
                </div>

                <!-- Available Beds -->
                <div class="col-md-4">
                    <label class="form-label-sm">Available Beds</label>
                    <input type="number" name="available_beds" class="form-control form-control-sm"
                           min="0" placeholder="e.g. 2"
                           value="{{ room.available_beds if room else '' }}" required>
                </div>

                <!-- Price per Month -->
                <div class="col-md-4">
                    <label class="form-label-sm">Price per Month (RM)</label>
                    <input type="number" step="0.01" name="price_per_month" class="form-control form-control-sm"
                           placeholder="e.g. 350.00"
                           value="{{ room.price_per_month if room else '' }}" required>
                </div>

                <!-- Status -->
                <div class="col-md-4">
                    <label class="form-label-sm">Status</label>
                    <select name="room_status" class="form-select form-select-sm">
                        <option value="Available" {% if not room or room.room_status == 'Available' %}selected{% endif %}>Available</option>
                        <option value="Occupied"  {% if room and room.room_status == 'Occupied'  %}selected{% endif %}>Occupied</option>
                    </select>
                </div>

                <!-- Room Details -->
                <div class="col-12">
                    <label class="form-label-sm">Room Details</label>
                    <textarea name="room_details" class="form-control form-control-sm"
                              rows="3"
                              placeholder="e.g. Air-conditioned, study desk, wardrobe, attached bathroom">{{ room.room_details if room else '' }}</textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="form-actions mt-4 d-flex gap-2">
                <button type="submit" class="btn-save">
                    {{ 'Save Changes' if room else 'Add Room' }}
                </button>
                <a href="{{ url_for('admin_rooms') }}" class="btn-cancel">Cancel</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>

{% endblock %}

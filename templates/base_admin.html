<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Student Hostel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_report.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/manage_booking.css') }}">

</head>
<body>

<nav class="navbar">
    <span class="navbar-name">
         {{ session.get('name', 'Admin') }}
    </span>
    <span class="navbar-title">
         Admin Dashboard
    </span>
</nav>

<div class="layout">
    <aside class="sidebar">
        <a href="{{ url_for('admin_dashboard') }}">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="{{ url_for('admin_registration') }}">
            <i class="fas fa-user-plus"></i> Registrations
        </a>
        <a href="{{ url_for('admin_rooms') }}">
            <i class="fas fa-bed"></i> Manage Rooms
        </a>
        <a href="{{ url_for('manage_booking') }}">
            <i class="fas fa-calendar-check"></i> Manage Bookings
        </a>
        <a href="{{ url_for('admin_reports') }}">
            <i class="fas fa-chart-pie"></i> Reports
        </a>
        <a href="{{ url_for('logout') }}">
            <i class="fas fa-sign-out-alt"></i> Log out
        </a>
    </aside>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>

</body>
</html>

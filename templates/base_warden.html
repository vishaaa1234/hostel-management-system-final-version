<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Dashboard - Student Hostel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/warden_dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/overdue_payments.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/warden_view_students.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/warden_view_student_details.css') }}">

</head>

<body>

<nav class="navbar">
    <span class="navbar-name">{{ session.get('name', 'Warden') }}</span>
    <span class="navbar-title">Warden Dashboard</span>
</nav>

<div class="layout">

    <aside class="sidebar">
        <a href="{{ url_for('warden_dashboard') }}">
            <i class="fas fa-home"></i> Home
        </a>

        <a href="{{ url_for('warden_edit_profile') }}">
            <i class="fas fa-user-edit"></i> Manage Profile
        </a>

        <a href="{{ url_for('manage_maintenance') }}">
            <i class="fas fa-tools"></i> Maintenance Requests
        </a>

        <a href="{{ url_for('overdue_payments') }}">
            <i class="fas fa-credit-card"></i> Overdue Payments
        </a>

        <a href="{{ url_for('payment_fine') }}">
            <i class="fas fa-receipt"></i> Fine Records
        </a>


        <a href="{{ url_for('manage_announcements') }}">
            <i class="fas fa-bullhorn"></i> Announcements
        </a>

        <a href="{{ url_for('logout') }}">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>

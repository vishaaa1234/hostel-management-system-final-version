<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Student Hostel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page-body">

<!-- Navbar -->
<nav class="navbar">
    <span class="navbar-brand">Student Hostel</span>
    <a href="{{ url_for('login') }}">
        <button type="button" class="back-btn">&larr; Back to Login</button>
    </a>
</nav>

<!-- Forgot Password Page -->
<div class="login-page">
    <div class="login-card">
        <h2>Forgot Password</h2>
        <hr>

        <p style="font-size:0.85rem; color:#555; text-align:center; margin-bottom:20px;">
            Enter the email linked to your account and we'll send you a link to reset your password.
        </p>

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            {% if message %}
            <p style="color:#2a4a6a; font-size:0.85rem; text-align:center; margin-bottom:16px;">{{ message }}</p>
            {% endif %}

            <button type="submit" class="login2-btn">Send Reset Link</button>

            <p class="register-text">
                Remembered your password? <a href="{{ url_for('login') }}">Back to Login</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>

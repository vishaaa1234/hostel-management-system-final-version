{% extends 'base_admin.html' %}
{% block content %}

<h1>
 View warden and student registration
</h1>
<!-- Management Cards -->
<div class="cards">

    <!-- Warden Management Card -->
    <div class="card">
        <div class="card-img warden-img">
            <i class="fas fa-user-tie"></i>
        </div>
        <div class="card-body">
            <p>Warden Management</p>
            <a href="{{ url_for('warden_registration') }}" class="card-btn">
                 Register Warden
            </a>
            <a href="{{ url_for('view_wardens') }}" class="card-btn">
                 View Wardens
            </a>
        </div>
    </div>

    <!-- Student Management Card -->
    <div class="card">
        <div class="card-img student-img">
            <i class="fas fa-user-graduate"></i>
        </div>
        <div class="card-body">
            <p>Student Management</p>
            <a href="{{ url_for('view_students') }}" class="card-btn">
                View Students
            </a>
        </div>
    </div>
</div>

{% endblock %}

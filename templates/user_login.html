<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Student Hostel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page-body">

<!-- Navbar -->
<nav class="navbar">
    <span class="navbar-brand">Student Hostel</span>
    <a href="{{ url_for('room_preview') }}">
        <button type="button" class="back-btn">&larr; Back to Rooms</button>
    </a>
</nav>

<!-- Login Page -->
<div class="login-page">
    <div class="login-card">
        <h2>User Login</h2>
        <hr>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <p style="text-align:right; margin-bottom:16px;">
                <a href="{{ url_for('forgot_password') }}" style="font-size:0.82rem; color:#5b9bd5; text-decoration:none;">
                    Forgot password?
                </a>
            </p>



            {% if message %}
            <p style="color:#c0392b; font-size:0.85rem; text-align:center; margin-bottom:16px;">{{ message }}</p>
            {% endif %}

            <button type="submit" class="login2-btn">Login</button>

            <p class="register-text">
                New to hostel? <a href="{{ url_for('student_register') }}">Register here</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>

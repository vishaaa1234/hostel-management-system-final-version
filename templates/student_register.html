<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration - Student Hostel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>


<nav class="navbar">
    <span class="navbar-brand">Student Hostel</span>
    <a href="{{ url_for('home') }}"><button class="back-btn">Back</button></a>
</nav>

<main class="register-page">
    <div class="register-card">
        <h2>Student Registration</h2>

        {% if message %}
        <p class="{{ 'success-msg' if success else 'error-msg' }}">{{ message }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('student_register') }}">

            <input type="hidden" name="role" value="student">

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Full Name"
                       value="{{ form_data.get('name', '') }}">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Email"
                       value="{{ form_data.get('email', '') }}">
            </div>

            <div class="form-group">
                <label for="phone_number">Phone<br>Number:</label>
                <input type="tel" id="phone_number" name="phone_number" placeholder="Phone number"
                       value="{{ form_data.get('phone_number', '') }}">
            </div>

             <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" class="form-control">
                    <option value="">Select gender</option>
                    <option value="Male" {% if form_data.get('gender') == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if form_data.get('gender') == 'Female' %}selected{% endif %}>Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="programme">Programme:</label>
                <input type="text" id="programme" name="programme" placeholder="Programme"
                       value="{{ form_data.get('programme', '') }}">
            </div>

            <div class="form-group">
    <label for="date_of_birth">Date of birth:</label>
    <input type="date" id="date_of_birth" name="date_of_birth" class="form-control form-control-sm">
</div>

            <div class="form-group">
                <label for="year_of_study">Year of study:</label>
                <select id="year_of_study" name="year_of_study" class="form-control">
                    <option value="">Select year of study</option>
                    <option value="1" {% if form_data.get('year_of_study') == '1' %}selected{% endif %}>Year 1</option>
                    <option value="2" {% if form_data.get('year_of_study') == '2' %}selected{% endif %}>Year 2</option>
                    <option value="3" {% if form_data.get('year_of_study') == '3' %}selected{% endif %}>Year 3</option>
                    <option value="4" {% if form_data.get('year_of_study') == '4' %}selected{% endif %}>Year 4</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">Home address:</label>
                <textarea id="address" name="address" placeholder="Full address"
                          rows="3">{{ form_data.get('address', '') }}</textarea>
            </div>

            <div class="form-group">
                <label for="emergency_contact">Emergency<br>Contact:</label>
                <input type="text" id="emergency_contact" name="emergency_contact" placeholder="Emergency contact"
                       value="{{ form_data.get('emergency_contact', '') }}">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm<br>Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password">
            </div>

            <div class="form-submit">
                <button type="submit" class="register-btn">Register</button>
            </div>

        </form>
    </div>
</main>

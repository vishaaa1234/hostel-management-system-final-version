<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Dashboard - Student Hostel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student_dashboard.css') }}">
</head>
<body>

<nav class="navbar">
    <span class="navbar-name">
        {{ session.get('name', 'Student') }}
    </span>
    <span class="navbar-title">
        Student Dashboard
    </span>
</nav>

<div class="layout">

    <aside class="sidebar">
        <a href="{{ url_for('student_dashboard') }}">
            <i class="fas fa-home"></i> Home
        </a>

        <a href="{{ url_for('room_booking') }}">
            <i class="fas fa-bed"></i> View/Book Rooms
        </a>
        <a href="{{ url_for('maintenance_request') }}">
            <i class="fas fa-tools"></i> Maintenance Request
        </a>
        <a href="{{ url_for('payment_history') }}">
            <i class="fas fa-credit-card"></i> Payment History
        </a>
        <a href="{{ url_for('student_edit_profile') }}">
            <i class=" fas fa-user-edit"></i> Manage Profile
        </a>
        <a href="{{ url_for('hostel_policy') }}">
    <i class="fas fa-file-contract"></i> Hostel Policies
</a>
        <a href="{{ url_for('chatbot') }}">
       <i class="fas fa-robot"></i> Hostel Assistant
        </a>

        <a href="{{ url_for('logout') }}">
            <i class="fas fa-sign-out-alt"></i> Log out
        </a>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>


</div>

</body>
</html>

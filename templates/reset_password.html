<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Student Hostel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page-body">

<!-- Navbar -->
<nav class="navbar">
    <span class="navbar-brand">Student Hostel</span>
</nav>

<!-- Reset Password Page -->
<div class="login-page">
    <div class="login-card">
        <h2>Reset Your Password</h2>
        <hr>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Enter new password" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
            </div>

            {% if message %}
            <p style="color:#c0392b; font-size:0.85rem; text-align:center; margin-bottom:16px;">{{ message }}</p>
            {% endif %}

            <button type="submit" class="login2-btn">Reset Password</button>
        </form>
    </div>
</div>

</body>
</html>

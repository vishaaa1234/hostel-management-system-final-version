{% extends 'base_student.html' %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/chatbot.css') }}">
<div class="page-header">
    <h4><i class="fas fa-robot"></i> Hostel Assistant</h4>
    <p>Ask about your booking, payments, fines, or maintenance requests.</p>
</div>

<div class="chat-card">
    <div id="chat-window" class="chat-window">
        <div class="chat-row bot">
            <div class="chat-bubble bot">
                Hi! I can help with hostel FAQs or check your own booking, payment, fine, and maintenance request status. What would you like to know?
                <span class="chat-time"></span>
            </div>
        </div>

        <div class="chat-suggestions" id="chat-suggestions">
            <button type="button" class="suggestion-pill">What's my payment status?</button>
            <button type="button" class="suggestion-pill">How do I submit a maintenance request?</button>
            <button type="button" class="suggestion-pill">Do I have any fines?</button>
        </div>
    </div>

    <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" class="chat-input" placeholder="Write your message..." autocomplete="off" required>
        <button type="submit" class="chat-send-btn">
            <i class="fas fa-arrow-up"></i>
        </button>
    </form>
</div>

<script>
const chatWindow = document.getElementById('chat-window');
const chatForm = document.getElementById('chat-form');
const chatInput = document.getElementById('chat-input');
const chatSuggestions = document.getElementById('chat-suggestions');

function currentTime() {
    const now = new Date();
    return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

document.querySelector('.chat-row.bot .chat-time').textContent = currentTime();

function addBubble(sender, text) {
    const row = document.createElement('div');
    row.className = 'chat-row ' + sender;

    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble ' + sender;

    const textNode = document.createTextNode(text);
    bubble.appendChild(textNode);

    const time = document.createElement('span');
    time.className = 'chat-time';
    time.textContent = currentTime();
    bubble.appendChild(time);

    row.appendChild(bubble);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return row;
}

async function sendMessage(message) {
    if (!message) return;

    if (chatSuggestions) {
        chatSuggestions.remove();
    }

    addBubble('user', message);
    chatInput.value = '';
    chatInput.disabled = true;

    const typingRow = addBubble('bot', 'Typing...');
    typingRow.classList.add('typing');

    try {
        const res = await fetch('/chatbot/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });
        const data = await res.json();
        typingRow.remove();
        addBubble('bot', data.reply || 'Sorry, something went wrong.');
    } catch (err) {
        typingRow.remove();
        addBubble('bot', 'Sorry, I could not reach the server. Please try again.');
    }

    chatInput.disabled = false;
    chatInput.focus();
}

chatForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const message = chatInput.value.trim();
    sendMessage(message);
});

document.querySelectorAll('.suggestion-pill').forEach(function (pill) {
    pill.addEventListener('click', function () {
        sendMessage(pill.textContent.trim());
    });
});
</script>

{% endblock %}
